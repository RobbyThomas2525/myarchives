<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Download Options</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Download Options</h1>
  <p>Select a file to download</p>
</header>

<div id="downloadBox" style="text-align:center; padding:40px; font-size:1.3em;">
  Loading download options...
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    document.getElementById("downloadBox").innerHTML = `
      <p>No item ID provided.</p>
      <p>Open this page from your main site using the "Download Options" button.</p>
    `;
  } else {

    fetch(`https://archive.org/metadata/${id}`)
      .then(r => r.json())
      .then(meta => {
        const files = meta.files || [];

        let html = `<p>Item: <strong>${id}</strong></p>`;

        // List all files
        html += `<h3>Direct Downloads:</h3>`;

        files.forEach(f => {
          // Skip thumbnails and metadata junk
          if (
            f.name.endsWith("_thumb.jpg") ||
            f.name.endsWith("_thumb.png") ||
            f.name.endsWith(".xml") ||
            f.name.endsWith(".json")
          ) return;

          const url = `https://archive.org/download/${id}/${f.name}`;

          html += `
            <p>
              <a href="${url}" class="download" target="_blank">
                ${f.name}
              </a>
            </p>
          `;
        });

        // Torrent
        const torrentUrl = `https://archive.org/download/${id}/${id}_archive.torrent`;

        html += `
          <br><br>
          <h3>Torrent Download:</h3>
          <a href="${torrentUrl}" class="download" target="_blank">
            Download via Torrent
          </a>
          <p style="font-size:0.9em; color:#555;">
            Requires a torrent client (qBittorrent, Transmission, etc.)
          </p>
        `;

        document.getElementById("downloadBox").innerHTML = html;
      });
  }
</script>

</body>
</html>
