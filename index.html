<html lang="en">

      --card-bg: #ffffff;

      --accent: #0077cc;
      --accent-dark: #005999;
      --border: #dddddd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      padding: 1.8rem 1rem;
    }

    .container {

      margin: 0 auto;

    .site-title {

    }

      font-size: 0.95rem;
      color: #bbbbbb;
    }

    nav {

      flex-wrap: wrap;
      gap: 0.75rem;
      font-size: 0.9rem;
    }

    nav a {
      color: #f0f0f0;
      text-decoration: none;
      padding-bottom: 0.1rem;
      border-bottom: 2px solid transparent;
    }

    nav a:hover {
      border-color: var(--accent);
    }

    main {
      padding: 2rem 1rem 3rem;
    }

    .section-title {
      font-size: 1.4rem;
      margin-bottom: 1rem;
    }

      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
    }

      margin: 0;
      font-size: 1.1rem;
