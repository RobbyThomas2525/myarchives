<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Archive.org Collection</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>My Archives</h1>
  <p>Automatically updated from my Archive.org uploads</p>
</header>

<div id="controls">
  <button onclick="sortAZ()">A → Z</button>
  <button onclick="sortZA()">Z → A</button>
  <button onclick="sortNewest()">Newest</button>
  <button onclick="sortOldest()">Oldest</button>

  <select id="categorySelect" onchange="filterCategory()">
    <option value="all">All Categories</option>
  </select>
</div>

  <!-- ⭐ NEW: Embedded Archive.org list -->
<section>
  <h2>My Archive.org Lists</h2>
  <iframe
    src="https://archive.org/details/@robbythomas2525/lists/"
    width="100%"
    height="400"
    frameborder="0"
    allowfullscreen>
  </iframe>
</section>  

<main id="items"></main>

<script src="script.js"></script>
</body>
</html>
