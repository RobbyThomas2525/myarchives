<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Archive.org Collection</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>My Archives</h1>
  <p>Automatically updated from my Archive.org uploads</p>
</header>

  <!-- ⭐ ADVANCED SEARCH SCRIPT -->
<script>
function runAdvancedSearch() {
  const title = document.getElementById("advTitle").value.trim();
  const keywords = document.getElementById("advKeywords").value.trim();
  const year = document.getElementById("advYear").value.trim();
  const media = document.getElementById("advMedia").value;
  const filetype = document.getElementById("advFileType").value;

  let query = `uploader:robbythomas2525`;

  if (title) query += ` AND title:${title}`;
  if (keywords) query += ` AND (${keywords})`;
  if (year) query += ` AND year:${year}`;
  if (media) query += ` AND mediatype:${media}`;
  if (filetype) query += ` AND format:${filetype}`;

  const url = `https://archive.org/advancedsearch.php?q=${encodeURIComponent(query)}&output=json&rows=100`;

  fetch(url)
    .then(r => r.json())
    .then(data => {
      const docs = data.response.docs || [];
      const box = document.getElementById("advResults");

      if (docs.length === 0) {
        box.innerHTML = "<p>No results found.</p>";
        return;
      }

      let html = "<h3>Advanced Search Results</h3>";

      docs.forEach(item => {
        const id = item.identifier;
        const title = item.title || id;

        html += `
          <p>
            <strong>${title}</strong><br>
            <a href="https://archive.org/details/${id}" target="_blank">View</a> |
            <a href="download.html?id=${id}" target="_blank">Download Options</a>
          </p>
        `;
      });

      box.innerHTML = html;
    });
}

<div id="controls">
  <button onclick="sortAZ()">A → Z</button>
  <button onclick="sortZA()">Z → A</button>
  <button onclick="sortNewest()">Newest</button>
  <button onclick="sortOldest()">Oldest</button>

  <select id="categorySelect" onchange="filterCategory()">
    <option value="software">Software</option>
  </select>
</div>

    <!-- ⭐ NEW: SEARCH BAR -->
<section>
  <h2>Search My Archive.org Uploads</h2>

  <input 
    type="text" 
    id="searchBar" 
    placeholder="Search my uploads..."
    style="width: 100%; padding: 10px; font-size: 1.1em;"
    oninput="searchArchive()"
  >

  <div id="searchResults" style="margin-top: 20px;"></div>
</section>

<main id="items"></main>

<script src="script.js"></script>
<script>
  function searchArchive() {
    const q = document.getElementById("searchBar").value.trim();
    const resultsBox = document.getElementById("searchResults");

    if (q.length < 2) {
      resultsBox.innerHTML = "";
      return;
    }

    const url = `https://archive.org/advancedsearch.php?q=${encodeURIComponent(q)}+AND+uploader:robbythomas2525&output=json&rows=50`;

    fetch(url)
      .then(r => r.json())
      .then(data => {
        const docs = data.response.docs || [];

        if (docs.length === 0) {
          resultsBox.innerHTML = "<p>No results found.</p>";
          return;
        }

        let html = "<h3>Search Results</h3>";

        docs.forEach(item => {
          const id = item.identifier;
          const title = item.title || id;

          html += `
            <p>
              <strong>${title}</strong><br>
              <a href="https://archive.org/details/${id}" target="_blank">View</a> |
              <a href="download.html?id=${id}" target="_blank">Download Options</a>
            </p>
          `;
        });

        resultsBox.innerHTML = html;
      });
  }
</script>
  
</body>
</html>
